<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pizza Order</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

  <nav class="navbar bg-danger px-3 shadow-sm">
    <div class="container-fluid">

      <a href="/" class="navbar-brand text-white fw-bold">
        <i class="fa-solid fa-pizza-slice me-2"></i>Pizza Order
      </a>

      <div class="d-flex align-items-center gap-4">

        <a href="#" class="text-white position-relative" title="Cart">
          <i class="fa-solid fa-cart-shopping fa-lg"></i>
          </a>

        {% if request.user.is_authenticated %}
            <a href="{% url 'logout' %}" class="text-white text-decoration-none fw-bold">
              <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="text-white text-decoration-none fw-bold">
              <i class="fa-solid fa-right-to-bracket me-1"></i> Login
            </a>
            <a href="{% url 'register' %}" class="text-white text-decoration-none fw-bold">
              Register
            </a>
        {% endif %}

      </div>

    </div>
  </nav>

  <div class="container mt-3">
      {% if messages %}
          {% for message in messages %}
              <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show shadow-sm" role="alert">

                  {% if message.tags == 'error' %}
                      <i class="fa-solid fa-triangle-exclamation me-2"></i>
                  {% elif message.tags == 'success' %}
                      <i class="fa-solid fa-circle-check me-2"></i>
                  {% endif %}

                  <strong>{{ message }}</strong>

                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
          {% endfor %}
      {% endif %}
  </div>

  {% block start %}
  {% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
