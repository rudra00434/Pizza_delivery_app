{% extends "base.html" %}

{% block start %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">

        <div class="col-12 col-md-8 col-lg-5">
            <div class="card shadow-lg border-0" style="border-radius: 16px;">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <i class="fa-solid fa-user-circle fa-3x text-danger mb-3"></i>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Log in to order your favorite pizza</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Username</label>
                            <input type="text" class="form-control form-control-lg bg-light" id="username" name="username" placeholder="Enter your username" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-danger btn-lg w-100 rounded-pill fw-bold shadow-sm">
                            Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                        </button>

                    </form>

                    <div class="mt-4 text-center">
                        <p class="text-muted mb-0">Don't have an account?
                            <a href="{% url 'register' %}" class="text-danger fw-bold text-decoration-none">Register here</a>
                        </p>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
